  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c4e5902d-0a4b-4399-83cb-3d472211c0fc\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: #ece9e2; }\n  body { font-family: 'Hanken Grotesk', system-ui, sans-serif; color: #232220; -webkit-font-smoothing: antialiased; }\n  ::selection { background: #d3e2d6; }\n  input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 3px; background: #e2ddd3; outline: none; }\n  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3d6b4e; cursor: pointer; border: 3px solid #fff; box-shadow: 0 1px 3px rgba(30,28,24,.3); }\n  textarea, input[type=text] { font-family: inherit; }\n  textarea:focus, input:focus { outline: none; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"min-height:100vh; background:#ece9e2; background-image: radial-gradient(circle at 1px 1px, rgba(30,28,24,.05) 1px, transparent 0); background-size: 28px 28px;\">\n<div style=\"max-width:1180px; margin:0 auto; padding:0 28px 120px;\">\n\n  <!-- ============ MASTHEAD ============ -->\n  <header style=\"padding:64px 0 40px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:28px;\">\n      <div style=\"width:22px; height:22px; border-radius:6px; background:#3d6b4e; display:flex; align-items:center; justify-content:center;\">\n        <div style=\"width:8px; height:8px; border-radius:2px; background:#fff;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:#3d6b4e; font-weight:600;\">SelfHandler<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-size:54px; line-height:1.04; letter-spacing:-.02em; margin:0 0 20px; max-width:780px; font-weight:600;\">MVP UI/UX — the daily operating system.<\u002Fh1>\n    <p style=\"font-size:19px; line-height:1.55; color:#56524b; max-width:620px; margin:0 0 32px; text-wrap:pretty;\">A focused first slice: open to <strong style=\"color:#232220; font-weight:600;\">Today<\u002Fstrong>, run your routines, link them to goals, and close the day with an evening review. Calm, repeat-use, built for the long haul — not a habit toy.<\u002Fp>\n    <div style=\"display:flex; flex-wrap:wrap; gap:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 12px; border-radius:7px; background:#fff; border:1px solid #e0dcd2; color:#56524b;\">Hi-fi · production-ready<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 12px; border-radius:7px; background:#fff; border:1px solid #e0dcd2; color:#56524b;\">Mobile + Desktop<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 12px; border-radius:7px; background:#fff; border:1px solid #e0dcd2; color:#56524b;\">Vue 3 SPA · Laravel REST<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; padding:7px 12px; border-radius:7px; background:#eef3ef; border:1px solid #cfe0d3; color:#3d6b4e;\">Interactive — tap the Today checklist<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- index strip -->\n  <nav style=\"display:grid; grid-template-columns:repeat(4, 1fr); gap:1px; background:#e0dcd2; border:1px solid #e0dcd2; border-radius:12px; overflow:hidden; margin-bottom:8px;\">\n    <div style=\"background:#f7f5f1; padding:14px 16px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a;\">01 — 02<\u002Fdiv><div style=\"font-size:14px; font-weight:500; margin-top:3px;\">Screen map · Flows<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f5f1; padding:14px 16px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a;\">03 — 04<\u002Fdiv><div style=\"font-size:14px; font-weight:500; margin-top:3px;\">Mobile · Desktop<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f5f1; padding:14px 16px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a;\">05 — 06<\u002Fdiv><div style=\"font-size:14px; font-weight:500; margin-top:3px;\">Components · States<\u002Fdiv><\u002Fdiv>\n    <div style=\"background:#f7f5f1; padding:14px 16px;\"><div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a;\">07 — 08<\u002Fdiv><div style=\"font-size:14px; font-weight:500; margin-top:3px;\">Vue notes · Deferred<\u002Fdiv><\u002Fdiv>\n  <\u002Fnav>\n\n  <!-- ============ DESIGN SYSTEM ============ -->\n  <section style=\"margin-top:64px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:24px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3d6b4e; font-weight:600;\">00<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">Visual system<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:1.2fr 1fr; gap:16px;\">\n      <!-- palette + tone -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:24px;\">\n        <div style=\"font-size:15px; font-weight:600; margin-bottom:4px;\">Palette — warm paper, muted forest<\u002Fdiv>\n        <p style=\"font-size:13.5px; color:#76716a; margin:0 0 18px; line-height:1.5;\">Near-monochrome warm neutrals so the content carries; one calm green for \"done\", active and progress. No alarm colors except a single soft red for true errors.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:repeat(6,1fr); gap:8px;\">\n          <div><div style=\"height:48px; border-radius:8px; background:#ece9e2; border:1px solid #e0dcd2;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">paper<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"height:48px; border-radius:8px; background:#ffffff; border:1px solid #e0dcd2;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">surface<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"height:48px; border-radius:8px; background:#3d6b4e;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">accent<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"height:48px; border-radius:8px; background:#eef3ef; border:1px solid #cfe0d3;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">accent/8<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"height:48px; border-radius:8px; background:#232220;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">ink<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"height:48px; border-radius:8px; background:#b5705a;\"><\u002Fdiv><div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; color:#9a948a; margin-top:6px;\">error<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:8px; margin-top:18px;\">\n          <div style=\"flex:1; padding:10px 12px; border-radius:9px; background:#eef3ef; border:1px solid #cfe0d3;\"><div style=\"font-size:12px; font-weight:600; color:#3d6b4e;\">Done<\u002Fdiv><div style=\"font-size:11px; color:#6f8a76;\">forest, filled<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; padding:10px 12px; border-radius:9px; background:#f3f1ec; border:1px solid #e2ddd3;\"><div style=\"font-size:12px; font-weight:600; color:#8c8377;\">Skipped<\u002Fdiv><div style=\"font-size:11px; color:#9a948a;\">neutral, struck<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; padding:10px 12px; border-radius:9px; background:#fff; border:1px dashed #cfcabf;\"><div style=\"font-size:12px; font-weight:600; color:#56524b;\">To do<\u002Fdiv><div style=\"font-size:11px; color:#9a948a;\">open ring<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- type -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:24px;\">\n        <div style=\"font-size:15px; font-weight:600; margin-bottom:14px;\">Type — Hanken Grotesk + JetBrains Mono<\u002Fdiv>\n        <div style=\"border-bottom:1px solid #efece5; padding-bottom:14px; margin-bottom:14px;\">\n          <div style=\"font-size:32px; font-weight:600; letter-spacing:-.02em; line-height:1.1;\">Close your day<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; margin-top:6px;\">Display / 600 / -2% tracking<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-bottom:1px solid #efece5; padding-bottom:14px; margin-bottom:14px;\">\n          <div style=\"font-size:16px; line-height:1.5; color:#3f3b35;\">UI body and labels stay in the humanist grotesque — quiet, legible at small sizes, friendly under daily repetition.<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; margin-top:6px;\">Body / 400–500<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:600; color:#3d6b4e;\">80% · 4/5 · 12d streak<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; margin-top:6px;\">Mono — every number, time, metric &amp; code label<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 01 SCREEN MAP ============ -->\n  <section style=\"margin-top:72px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3d6b4e; font-weight:600;\">01<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">MVP screen map<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; color:#56524b; max-width:620px; margin:0 0 28px; line-height:1.55;\">Four routes, one hub. The app opens on <strong style=\"color:#232220;\">Today<\u002Fstrong> — the workspace, not a landing page. Everything else exists to feed Today or be configured occasionally.<\u002Fp>\n\n    <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:16px; padding:32px;\">\n      <!-- entry -->\n      <div style=\"display:flex; justify-content:center; margin-bottom:10px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; padding:6px 12px; border:1px dashed #cfcabf; border-radius:20px;\">app open · single-user session<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; justify-content:center;\"><div style=\"width:1px; height:22px; background:#d8d2c7;\"><\u002Fdiv><\u002Fdiv>\n\n      <!-- TODAY hub -->\n      <div style=\"max-width:520px; margin:0 auto;\">\n        <div style=\"background:#eef3ef; border:1.5px solid #3d6b4e; border-radius:14px; padding:20px 22px;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\">\n            <div style=\"font-size:18px; font-weight:600; color:#2f5740;\">Today  ·  /<\u002Fdiv>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#3d6b4e; background:#fff; border:1px solid #cfe0d3; padding:4px 9px; border-radius:6px;\">default route<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-size:13.5px; color:#56655a; line-height:1.5;\">Routine checklist · completion rate · streak summary · evening-review entry · goal context. Reads <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#3d6b4e;\">GET /api/today<\u002Fcode>.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- connectors -->\n      <div style=\"display:flex; justify-content:center;\"><div style=\"width:1px; height:22px; background:#d8d2c7;\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"max-width:840px; margin:0 auto; height:1px; background:#d8d2c7;\"><\u002Fdiv>\n      <div style=\"max-width:840px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr);\">\n        <div style=\"display:flex; justify-content:center;\"><div style=\"width:1px; height:22px; background:#d8d2c7;\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; justify-content:center;\"><div style=\"width:1px; height:22px; background:#d8d2c7;\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex; justify-content:center;\"><div style=\"width:1px; height:22px; background:#d8d2c7;\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- satellites -->\n      <div style=\"max-width:840px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n        <div style=\"background:#faf8f4; border:1px solid #e6e2d8; border-radius:12px; padding:18px;\">\n          <div style=\"font-size:15.5px; font-weight:600; margin-bottom:4px;\">Routines  <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; font-weight:400;\">/routines<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px; color:#76716a; line-height:1.5;\">Create &amp; edit repeatable actions. Schedule: daily / weekdays. Activate or hide.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#faf8f4; border:1px solid #e6e2d8; border-radius:12px; padding:18px;\">\n          <div style=\"font-size:15.5px; font-weight:600; margin-bottom:4px;\">Review  <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; font-weight:400;\">/review/:date?<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px; color:#76716a; line-height:1.5;\">One evening review per day — mood, energy, stress, rating, reflections.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#faf8f4; border:1px solid #e6e2d8; border-radius:12px; padding:18px;\">\n          <div style=\"font-size:15.5px; font-weight:600; margin-bottom:4px;\">Goals  <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#9a948a; font-weight:400;\">/goals<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px; color:#76716a; line-height:1.5;\">Active goals and the routines linked to each (many-to-many pivot).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:24px; padding-top:18px; border-top:1px solid #efece5; display:flex; flex-wrap:wrap; gap:18px;\">\n        <div style=\"display:flex; align-items:center; gap:8px;\"><div style=\"width:10px; height:10px; border-radius:3px; background:#3d6b4e;\"><\u002Fdiv><span style=\"font-size:12.5px; color:#76716a;\">Daily-loop screen (high frequency)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px;\"><div style=\"width:10px; height:10px; border-radius:3px; background:#cdbf9c;\"><\u002Fdiv><span style=\"font-size:12.5px; color:#76716a;\">Management screen (occasional)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 FLOWS ============ -->\n  <section style=\"margin-top:72px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3d6b4e; font-weight:600;\">02<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">Core user flows<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; color:#56524b; max-width:620px; margin:0 0 28px; line-height:1.55;\">Four loops carry the whole MVP. Two run every day (morning, evening); two are setup, done occasionally.<\u002Fp>\n\n    <div style=\"display:grid; gap:14px;\">\n      <!-- flow A -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#3d6b4e; background:#eef3ef; border:1px solid #cfe0d3; padding:4px 9px; border-radius:6px;\">DAILY · AM<\u002Fspan>\n          <span style=\"font-size:15px; font-weight:600;\">Run the morning routine<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:13.5px;\">\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Open app → Today<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">See today's items + 0% bar<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#eef3ef; border:1px solid #cfe0d3; border-radius:8px; color:#2f5740;\">Tap row = done<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Completion + streak update<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Optimistic <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">PUT …/logs/{date}<\u002Fcode><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- flow B -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#8c7a52; background:#f6f1e6; border:1px solid #e6d9bf; padding:4px 9px; border-radius:6px;\">DAILY · EDGE<\u002Fspan>\n          <span style=\"font-size:15px; font-weight:600;\">Skip a routine deliberately<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:13.5px;\">\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Long-press row <span style=\"color:#9a948a;\">(mobile)<\u002Fspan> / Skip control <span style=\"color:#9a948a;\">(desktop)<\u002Fspan><\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Choose “Skip”, optional note<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Row struck, neutral — not a failure<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Excluded from completion rate<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- flow C -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#3d6b4e; background:#eef3ef; border:1px solid #cfe0d3; padding:4px 9px; border-radius:6px;\">DAILY · PM<\u002Fspan>\n          <span style=\"font-size:15px; font-weight:600;\">Close the day with an evening review<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; flex-wrap:wrap; gap:6px; font-size:13.5px;\">\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Today → “Close your day”<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Mood · energy · stress · rating<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#f3f1ec; border-radius:8px;\">Went well · improve · notes<\u002Fspan>\n          <span style=\"color:#bdb7aa; font-family:'JetBrains Mono',monospace;\">→<\u002Fspan>\n          <span style=\"padding:8px 13px; background:#eef3ef; border:1px solid #cfe0d3; border-radius:8px; color:#2f5740;\">Save <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">PUT /daily-reviews/{date}<\u002Fcode><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- flow D -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px 24px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:16px;\">\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:#6a6256; background:#f0ede6; border:1px solid #ddd7cb; padding:4px 9px; border-radius:6px;\">SETUP<\u002Fspan>\n          <span style=\"font-size:15px; font-weight: ont-size:13px; color:#3d6b4e; font-weight:600;\">06<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">Empty · loading · error · saved<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; color:#56524b; max-width:640px; margin:0 0 28px; line-height:1.55;\">Every fetch and write has a defined state. Calm copy, no alarm — absence of a log means \"not handled yet\", never \"failed\".<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:16px;\">\n      <!-- empty -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; overflow:hidden;\">\n        <div style=\"padding:10px 16px; background:#faf8f4; border-bottom:1px solid #efece5; font-family:'JetBrains Mono',monospace; font-size:10px; color:#a59d91; letter-spacing:.06em;\">EMPTY<\u002Fdiv>\n        <div style=\"padding:22px 18px; text-align:center;\">\n          <div style=\"width:40px; height:40px; border-radius:11px; border:1.5px dashed #cfcabf; margin:0 auto 14px;\"><\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; margin-bottom:6px;\">No routines yet<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8c8377; line-height:1.5; margin-bottom:14px;\">Add your first routine and it'll show up here every day.<\u002Fdiv>\n          <span style=\"display:inline-block; font-size:12.5px; font-weight:600; color:#fff; background:#3d6b4e; padding:8px 14px; border-radius:8px;\">+ New routine<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- loading -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; overflow:hidden;\">\n        <div style=\"padding:10px 16px; background:#faf8f4; border-bottom:1px solid #efece5; font-family:'JetBrains Mono',monospace; font-size:10px; color:#a59d91; letter-spacing:.06em;\">LOADING<\u002Fdiv>\n        <div style=\"padding:22px 18px;\">\n          <div style=\"height:14px; width:60%; background:#efece5; border-radius:5px; margin-bottom:14px;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><div style=\"width:22px;height:22px;border-radius:50%;background:#efece5;\"><\u002Fdiv><div style=\"height:11px; flex:1; background:#efece5; border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:12px;\"><div style=\"width:22px;height:22px;border-radius:50%;background:#efece5;\"><\u002Fdiv><div style=\"height:11px; flex:1; background:#efece5; border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\"><div style=\"width:22px;height:22px;border-radius:50%;background:#efece5;\"><\u002Fdiv><div style=\"height:11px; width:70%; background:#efece5; border-radius:5px;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#b0a99d; margin-top:16px;\">skeleton · GET /api/today<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- error -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; overflow:hidden;\">\n        <div style=\"padding:10px 16px; background:#faf2ef; border-bottom:1px solid #ecdcd5; font-family:'JetBrains Mono',monospace; font-size:10px; color:#b5705a; letter-spacing:.06em;\">ERROR<\u002Fdiv>\n        <div style=\"padding:22px 18px; text-align:center;\">\n          <div style=\"width:40px; height:40px; border-radius:11px; background:#faf2ef; border:1px solid #ecdcd5; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; color:#b5705a; font-size:20px;\">!<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; margin-bottom:6px;\">Couldn't load today<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8c8377; line-height:1.5; margin-bottom:14px;\">Your last changes are saved locally and will sync.<\u002Fdiv>\n          <span style=\"display:inline-block; font-size:12.5px; font-weight:600; color:#b5705a; background:#faf2ef; border:1px solid #ecdcd5; padding:8px 14px; border-radius:8px;\">Retry<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- saved -->\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; overflow:hidden;\">\n        <div style=\"padding:10px 16px; background:#eef3ef; border-bottom:1px solid #cfe0d3; font-family:'JetBrains Mono',monospace; font-size:10px; color:#3d6b4e; letter-spacing:.06em;\">SAVED<\u002Fdiv>\n        <div style=\"padding:22px 18px; text-align:center;\">\n          <div style=\"width:40px; height:40px; border-radius:50%; background:#3d6b4e; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700;\">✓<\u002Fdiv>\n          <div style=\"font-size:14px; font-weight:600; margin-bottom:6px;\">Review saved<\u002Fdiv>\n          <div style=\"font-size:12.5px; color:#8c8377; line-height:1.5; margin-bottom:14px;\">Optimistic UI · upsert confirmed for Jun 21.<\u002Fdiv>\n          <span style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#3d6b4e; background:#eef3ef; border:1px solid #cfe0d3; padding:6px 11px; border-radius:7px;\">200 · PUT /daily-reviews<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px; background:#fff; border:1px solid #e0dcd2; border-radius:12px; padding:16px 20px; font-size:13px; color:#76716a; line-height:1.6;\">\n      <strong style=\"color:#232220;\">Write semantics —<\u002Fstrong> routine done/skip and review edits are <strong style=\"color:#3d6b4e;\">optimistic<\u002Fstrong>: UI updates instantly, the <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#3d6b4e;\">PUT<\u002Fcode> upsert reconciles in the background, and a failure rolls the row back with an inline retry. No spinners block the daily tap.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 07 VUE NOTES ============ -->\n  <section style=\"margin-top:72px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3d6b4e; font-weight:600;\">07<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">Vue implementation notes<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; color:#56524b; max-width:640px; margin:0 0 28px; line-height:1.55;\">Vue 3 SPA in <code style=\"font-family:'JetBrains Mono',monospace; font-size:14px; color:#3d6b4e;\">apps/web<\u002Fcode>, Capacitor-wrapped for Android. One responsive codebase — the AppShell swaps rail ⟷ tab-bar at the breakpoint.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px;\">\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#3d6b4e; letter-spacing:.06em; margin-bottom:14px;\">ROUTER ↔ API<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:12.5px; line-height:2; color:#56524b;\">\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid #f1eee7; padding:3px 0;\"><span style=\"color:#232220;\">/<\u002Fspan><span style=\"color:#9a948a;\">GET /api/today?date<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid #f1eee7; padding:3px 0;\"><span style=\"color:#232220;\">/routines<\u002Fspan><span style=\"color:#9a948a;\">GET·POST·PATCH /routines<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid #f1eee7; padding:3px 0;\"><span style=\"color:#232220;\">routine done<\u002Fspan><span style=\"color:#9a948a;\">PUT /routines/{id}/logs/{date}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid #f1eee7; padding:3px 0;\"><span style=\"color:#232220;\">/review/:date<\u002Fspan><span style=\"color:#9a948a;\">PUT /daily-reviews/{date}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; padding:3px 0;\"><span style=\"color:#232220;\">/goals link<\u002Fspan><span style=\"color:#9a948a;\">POST /goals/{g}/routines/{r}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:22px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#3d6b4e; letter-spacing:.06em; margin-bottom:14px;\">STATE &amp; PATTERNS<\u002Fdiv>\n        <ul style=\"margin:0; padding-left:18px; font-size:13.5px; color:#56524b; line-height:1.7;\">\n          <li>Pinia stores: <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">useToday<\u002Fcode>, <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">useRoutines<\u002Fcode>, <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">useGoals<\u002Fcode> — Today is the only one fetched on load.<\u002Fli>\n          <li>Thin <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">api/client.ts<\u002Fcode> wraps the REST contract; <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">CurrentUser<\u002Fcode> header during dev.<\u002Fli>\n          <li>Completion % &amp; streaks are <strong style=\"color:#232220;\">computed<\u002Fstrong> from <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">routine_logs<\u002Fcode> in the store — no <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">daily_metrics<\u002Fcode> table yet.<\u002Fli>\n          <li>Done/skip toggles dispatch the upsert optimistically; rollback on reject.<\u002Fli>\n          <li>Date in the route is the single source of truth for Today &amp; Review.<\u002Fli>\n          <li>One log per routine per date enforced by the unique key — PUT is idempotent.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:16px; background:#26302a; border-radius:14px; padding:22px 24px;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; color:#a8c4b0; letter-spacing:.06em; margin-bottom:14px;\">BUILD ORDER (from MVP_TECHNICAL_DESIGN)<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12.5px;\">\n        <span style=\"color:#dfe9e2; background:#33403a; padding:6px 11px; border-radius:7px;\">1 · migrations<\u002Fspan>\n        <span style=\"color:#dfe9e2; background:#33403a; padding:6px 11px; border-radius:7px;\">2 · models<\u002Fspan>\n        <span style=\"color:#dfe9e2; background:#33403a; padding:6px 11px; border-radius:7px;\">3 · controllers<\u002Fspan>\n        <span style=\"color:#dfe9e2; background:#33403a; padding:6px 11px; border-radius:7px;\">4 · feature tests<\u002Fspan>\n        <span style=\"color:#dfe9e2; background:#33403a; padding:6px 11px; border-radius:7px;\">5 · API client<\u002Fspan>\n        <span style=\"color:#9be0b0; background:#3d6b4e; padding:6px 11px; border-radius:7px;\">6 · Today<\u002Fspan>\n        <span style=\"color:#9be0b0; background:#3d6b4e; padding:6px 11px; border-radius:7px;\">7 · Routines<\u002Fspan>\n        <span style=\"color:#9be0b0; background:#3d6b4e; padding:6px 11px; border-radius:7px;\">8 · Review<\u002Fspan>\n        <span style=\"color:#9be0b0; background:#3d6b4e; padding:6px 11px; border-radius:7px;\">9 · Goals linking<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 DEFERRED ============ -->\n  <section style=\"margin-top:72px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:8px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:13px; color:#3d6b4e; font-weight:600;\">08<\u002Fspan>\n      <h2 style=\"font-size:13px; font-family:'JetBrains Mono',monospace; letter-spacing:.14em; text-transform:uppercase; color:#56524b; margin:0; font-weight:600;\">Deferred — kept out on purpose<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16px; color:#56524b; max-width:640px; margin:0 0 28px; line-height:1.55;\">The full system has 11 modules. This slice stays narrow so one vertical path ships end-to-end. Everything below is designed but not built yet — the model leaves a clean migration path (e.g. a Routine can later own a RecurringRule).<\u002Fp>\n    <div style=\"background:#fff; border:1px solid #e0dcd2; border-radius:14px; padding:8px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px;\">\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Finance &amp; wishlists<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Meal / nutrition planning<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">AI &amp; integrations<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Notifications &amp; reminders<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Recurrence engine · planned_occurrences<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">daily_metrics rollups<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Weekly / monthly reviews<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Deep analytics &amp; trends<\u002Fdiv><\u002Fdiv>\n        <div style=\"padding:16px;\"><div style=\"font-size:13.5px; font-weight:500; color:#8c8377;\">Multi-user &amp; collaboration<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:16px; display:flex; flex-wrap:wrap; gap:10px;\">\n      <div style=\"flex:1; min-width:240px; background:#eef3ef; border:1px solid #cfe0d3; border-radius:12px; padding:16px 18px;\"><div style=\"font-size:13px; font-weight:600; color:#2f5740; margin-bottom:4px;\">Auth — deferred but decided<\u002Fdiv><div style=\"font-size:12.5px; color:#56655a; line-height:1.5;\">Temporary <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">CurrentUser<\u002Fcode> resolver now; Sanctum SPA auth once the first loop works. <code style=\"font-family:'JetBrains Mono',monospace; font-size:12px;\">user_id<\u002Fcode> on every table from day one.<\u002Fdiv><\u002Fdiv>\n      <div style=\"flex:1; min-width:240px; background:#faf8f4; border:1px solid #e6e2d8; border-radius:12px; padding:16px 18px;\"><div style=\"font-size:13px; font-weight:600; margin-bottom:4px;\">Online-only, single-user<\u002Fdiv><div style=\"font-size:12.5px; color:#76716a; line-height:1.5;\">No offline sync engine in the MVP. Optimistic writes + retry cover the daily loop; Capacitor ships the same web client to Android.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- footer -->\n  <footer style=\"margin-top:80px; padding-top:28px; border-top:1px solid #ddd7cb; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;\">\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#9a948a;\">SelfHandler · MVP UI/UX · first product slice<\u002Fspan>\n    <span style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#9a948a;\">Today · Routines · Review · Goals<\u002Fspan>\n  <\u002Ffooter>\n\n<\u002Fdiv><\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    routines: [\n      { id:'walk',  name:'Morning sunlight walk', time:'07:00', kind:'habit',   goal:'Sleep 7.5h',  dot:'#c2843f', streak:12, status:'done' },\n      { id:'deep',  name:'Deep work block',       time:'09:00', kind:'routine', goal:'Ship MVP',    dot:'#3d6b4e', streak:8,  status:'done' },\n      { id:'train', name:'Strength training',     time:'18:00', kind:'routine', goal:'Sub-50 10K',  dot:'#4f6d8a', streak:5,  status:'todo' },\n      { id:'read',  name:'Read 20 pages',         time:'21:30', kind:'habit',   goal:null,          dot:'#9a948a', streak:21, status:'done' },\n      { id:'sleep', name:'Lights out by 23:00',   time:'23:00', kind:'sleep',   goal:'Sleep 7.5h',  dot:'#c2843f', streak:3,  status:'todo' },\n    ],\n    review: { mood:7, energy:6, stress:4, day:8, wentWell:'', improve:'', notes:'' },\n  };\n\n  cycle(id){\n    this.setState(s => ({ routines: s.routines.map(r => r.id===id ? { ...r, status: r.status==='done' ? 'todo' : 'done' } : r) }));\n  }\n  skip(id){\n    this.setState(s => ({ routines: s.routines.map(r => r.id===id ? { ...r, status: r.status==='skipped' ? 'todo' : 'skipped' } : r) }));\n  }\n  setR(k, v){ this.setState(s => ({ review: { ...s.review, [k]: v } })); }\n\n  decorate(r){\n    const isDone = r.status==='done', isSkip = r.status==='skipped';\n    return {\n      ...r,\n      goalLabel: r.goal || 'unlinked',\n      isDone, isSkip, isTodo: !isDone && !isSkip,\n      mark: isDone ? '✓' : (isSkip ? '–' : ''),\n      boxBg: isDone ? '#3d6b4e' : '#ffffff',\n      boxBorder: isDone ? '#3d6b4e' : (isSkip ? '#d8d2c7' : '#c4beb2'),\n      boxColor: isDone ? '#ffffff' : '#8c8377',\n      boxStyle: isSkip ? 'solid' : (isTodoDash(r.status)),\n      nameColor: isDone ? '#7a8f80' : (isSkip ? '#a59d91' : '#26241f'),\n      nameDecoration: (isDone || isSkip) ? 'line-through' : 'none',\n      onCycle: () => this.cycle(r.id),\n      onSkip: (e) => { if (e && e.stopPropagation) e.stopPropagation(); this.skip(r.id); },\n    };\n    function isTodoDash(st){ return st==='todo' ? 'dashed' : 'solid'; }\n  }\n\n  renderVals(){\n    const rs = this.state.routines;\n    const decorated = rs.map(r => this.decorate(r));\n    const done = rs.filter(r => r.status==='done').length;\n    const skipped = rs.filter(r => r.status==='skipped').length;\n    const total = rs.length;\n    const actionable = total; // handled = done+skipped\n    const pct = Math.round((done / total) * 100);\n    const rv = this.state.review;\n    return {\n      routines: decorated,\n      doneCount: done,\n      skipCount: skipped,\n      todoCount: total - done - skipped,\n      total,\n      pct,\n      pctStr: pct + '%',\n      barWidth: pct + '%',\n      handledStr: (done + skipped) + '/' + total,\n      review: rv,\n      moodStr: rv.mood, energyStr: rv.energy, stressStr: rv.stress, dayStr: rv.day,\n      setMood:   e => this.setR('mood',   +e.target.value),\n      setEnergy: e => this.setR('energy', +e.target.value),\n      setStress: e => this.setR('stress', +e.target.value),\n      setDay:    e => this.setR('day',    +e.target.value),\n      setWell:   e => this.setR('wentWell', e.target.value),\n      setImprove:e => this.setR('improve', e.target.value),\n      setNotes:  e => this.setR('notes', e.target.value),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
